name: Deploy Flet Web to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # É aqui que corrigimos o erro 404:
          path: 'build/web'
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4