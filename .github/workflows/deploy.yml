name: Deploy Flet App to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # PASSO NOVO: Instala o Flutter automaticamente para o Flet não perguntar
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-root

      - name: Build Flet Web
        run: |
          # O --no-docker garante que ele use o Flutter que instalamos acima
          poetry run flet build web src --base-url /ETEMAC-CALCULADORA-FREQUENCIA/

      - name: Add .nojekyll
        run: touch src/build/web/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: src/build/web
          branch: gh-pages
          clean: true
